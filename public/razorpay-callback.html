<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Successful - ProTrack</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      background-color: #0f172a;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      padding: 20px;
      text-align: center;
    }
    .container {
      max-width: 600px;
      padding: 40px;
      background-color: #1e293b;
      border-radius: 8px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
      color: #3b82f6;
    }
    p {
      font-size: 1.1rem;
      line-height: 1.6;
      color: #cbd5e1;
      margin-bottom: 1.5rem;
    }
    .loader {
      border: 5px solid #f3f3f3;
      border-top: 5px solid #3b82f6;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .check-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
    }
    .check-icon svg {
      width: 100%;
      height: 100%;
      fill: #10b981;
    }
    .redirect-link {
      display: inline-block;
      margin-top: 20px;
      color: #3b82f6;
      text-decoration: underline;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container" id="payment-message">
    <div class="check-icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 22C6.477 22 2 17.523 2 12S6.477 2 12 2s10 4.477 10 10-4.477 10-10 10zm-.997-6l7.07-7.071-1.414-1.414-5.656 5.657-2.829-2.829-1.414 1.414L11.003 16z"/>
      </svg>
    </div>
    <h1>Payment Successful!</h1>
    <p>Thank you for upgrading to ProTrack Plus. Your subscription has been activated.</p>
    <p>You will be redirected to the dashboard in a few seconds...</p>
    <div class="loader"></div>
    <a class="redirect-link" onclick="window.location.href='/'">Click here if you are not redirected automatically</a>
  </div>
  
  <script src="/razorpay-callback.js"></script>
  <script>
    // Additional fallback redirect
    setTimeout(function() {
      window.location.href = '/';
    }, 4000);
  </script>
</body>
</html>
